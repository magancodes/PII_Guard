<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PII Guard</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="header">
    <div class="logo-container">
      <div class="shield-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
      </div>
      <h1>PII Guard</h1>
    </div>
    <label class="switch">
      <input type="checkbox" id="global-toggle">
      <span class="slider round"></span>
    </label>
  </div>

  <div class="content">
    <div class="current-site-group">
      <button id="whitelist-btn" class="btn btn-outline" style="margin-top: 10px; width: 100%;">Disable on this site</button>
      <button id="options-btn" class="btn" style="width: 100%; margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 6px; background: var(--surface-light); color: var(--text-primary);">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width: 16px; height: 16px;">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        Advanced Settings
      </button>
    </div>

    <div class="settings-group">
      <h3>Detection Types</h3>
      
      <div class="setting-item">
        <span class="setting-label">Emails</span>
        <label class="switch small">
          <input type="checkbox" id="toggle-emails">
          <span class="slider round"></span>
        </label>
      </div>

      <div class="setting-item">
        <span class="setting-label">Phone Numbers</span>
        <label class="switch small">
          <input type="checkbox" id="toggle-phones">
          <span class="slider round"></span>
        </label>
      </div>

      <div class="setting-item">
        <span class="setting-label">Numbers (Any)</span>
        <label class="switch small">
          <input type="checkbox" id="toggle-numbers">
          <span class="slider round"></span>
        </label>
      </div>

      <div class="setting-item">
        <span class="setting-label">UPI URLs / IDs</span>
        <label class="switch small">
          <input type="checkbox" id="toggle-upi">
          <span class="slider round"></span>
        </label>
      </div>

      <div class="setting-item">
        <div class="label-with-badge">
          <span class="setting-label">Names (AI)</span>
          <span class="badge">Pro</span>
        </div>
        <label class="switch small">
          <input type="checkbox" id="toggle-names">
          <span class="slider round"></span>
        </label>
      </div>
    </div>
  </div>

  <div class="footer">
    <button id="options-btn" class="btn ghost">Advanced Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
