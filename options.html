<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PII Guard Options</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: #0F172A;
      color: #F8FAFC;
      margin: 0;
      padding: 40px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #1E293B;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    h1 {
      margin-top: 0;
      color: #3B82F6;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    h1 svg { width: 32px; height: 32px; }
    .form-group {
      margin-bottom: 24px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #CBD5E1;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0F172A;
      color: white;
      box-sizing: border-box;
      font-size: 14px;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #3B82F6;
    }
    .help-text {
      font-size: 13px;
      color: #94A3B8;
      margin-top: 6px;
    }
    .help-text a {
      color: #3B82F6;
      text-decoration: none;
    }
    button.save-btn {
      background: #3B82F6;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 16px;
    }
    button.save-btn:hover {
      background: #2563EB;
    }
    #status {
      display: none;
      margin-top: 16px;
      color: #10B981;
      font-weight: 500;
      padding: 12px;
      background: rgba(16, 185, 129, 0.1);
      border-radius: 6px;
    }
    .whitelist-section {
      margin-top: 40px;
      border-top: 1px solid #334155;
      padding-top: 24px;
    }
    .whitelist-list {
      background: #0F172A;
      border: 1px solid #334155;
      border-radius: 6px;
      max-height: 200px;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .whitelist-list li {
      padding: 12px 16px;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .whitelist-list li:last-child {
      border-bottom: none;
    }
    .remove-btn {
      background: none;
      border: none;
      color: #E11D48;
      cursor: pointer;
      font-weight: 600;
    }
    .remove-btn:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
      </svg>
      PII Guard Options
    </h1>

    <div class="whitelist-section" style="border-top: none; margin-top: 20px; padding-top: 0;">
      <h3>Whitelist (Disabled Domains)</h3>
      <p class="help-text">The extension is completely disabled on these sites.</p>
      <ul id="whitelist-list" class="whitelist-list">
        <!-- Rendered by JS -->
      </ul>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
