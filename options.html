<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PII Guard Settings</title>
  <style>
    :root {
      --bg-color: #0F172A;
      --surface: #1E293B;
      --surface-light: #334155;
      --text-primary: #F8FAFC;
      --text-muted: #94A3B8;
      --primary: #3B82F6;
      --danger: #E11D48;
    }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }
    
    .container {
      background-color: var(--surface);
      border-radius: 12px;
      padding: 30px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
    }

    h1 {
      margin-top: 0;
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--surface-light);
      padding-bottom: 15px;
      margin-bottom: 25px;
    }

    h1 svg {
      width: 24px;
      height: 24px;
      color: var(--primary);
    }
    
    h3 {
      font-size: 14px;
      margin: 0 0 10px 0;
    }

    .help-text {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 0;
      margin-bottom: 15px;
      line-height: 1.5;
    }

    .whitelist-section {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 15px;
      border: 1px solid var(--surface-light);
    }
    
    .whitelist-list {
      list-style: none;
      padding: 0;
      margin: 0 0 15px 0;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .whitelist-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    
    .remove-btn {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 4px;
    }
    
    .remove-btn:hover {
      background: rgba(225, 29, 72, 0.1);
    }
    
    .add-row {
      display: flex;
      gap: 10px;
    }
    
    input[type="text"] {
      flex: 1;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid var(--surface-light);
      background: var(--surface);
      color: white;
      font-family: inherit;
    }
    
    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #2563EB;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
      </svg>
      PII Guard Advanced Settings
    </h1>

    <div class="whitelist-section">
      <h3>Whitelist (Disabled Domains)</h3>
      <p class="help-text">The extension is globally disabled on the following sites. You can also disable sites quickly from the main popup menu.</p>
      
      <ul id="whitelist-list" class="whitelist-list">
        <!-- Javascript populated -->
      </ul>
      
      <div class="add-row">
        <input type="text" id="new-domain" placeholder="e.g. mail.google.com">
        <button id="add-domain-btn" class="btn">Add Domain</button>
      </div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
